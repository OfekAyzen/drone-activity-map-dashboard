services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drone
      POSTGRES_PASSWORD: drone
      POSTGRES_DB: drone
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drone"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    image: drone-dashboard-api
    environment:
      DATABASE_URL: postgresql+psycopg://drone:drone@db:5432/drone
      CORS_ORIGINS: http://localhost:4200
      PIPELINE_INPUT_DIR: data/incoming
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  pgdata:

<div class="filter-bar">
  <app-filter-chip #typeChip [label]="droneTypeLabel()" [active]="!!droneType()">
    <label class="popover-label" for="drone_type">Drone type</label>
    <input
      id="drone_type"
      class="chip-input"
      type="text"
      placeholder="e.g. Quadcopter"
      [value]="droneType()"
      (input)="onDroneTypeInput($event)"
      (blur)="applyDroneType()"
      (keydown.enter)="applyDroneType(); typeChip.close()"
    />
  </app-filter-chip>

  <app-filter-chip #statusChip [label]="statusLabel()" [active]="!!status()">
    <div class="option-list" role="radiogroup" aria-label="Status">
      <button
        type="button"
        *ngFor="let option of statusOptions"
        class="option"
        role="radio"
        [attr.aria-checked]="option.value === status()"
        [class.selected]="option.value === status()"
        (click)="selectStatus(option.value, statusChip)"
      >
        {{ option.label }}
      </button>
    </div>
  </app-filter-chip>

  <app-filter-chip #operatorChip [label]="operatorIdLabel()" [active]="!!operatorId()">
    <label class="popover-label" for="operator_id">Operator ID</label>
    <input
      id="operator_id"
      class="chip-input"
      type="text"
      placeholder="e.g. OP-123"
      [value]="operatorId()"
      (input)="onOperatorIdInput($event)"
      (blur)="applyOperatorId()"
      (keydown.enter)="applyOperatorId(); operatorChip.close()"
    />
  </app-filter-chip>

  <app-filter-chip #batteryChip [label]="minBatteryLabel()" [active]="minBattery() != null">
    <label class="popover-label" for="min_battery">Min battery %</label>
    <input
      id="min_battery"
      class="chip-input"
      type="number"
      min="0"
      max="100"
      [value]="minBattery()"
      (input)="onMinBatteryInput($event)"
      (blur)="applyMinBattery()"
      (keydown.enter)="applyMinBattery(); batteryChip.close()"
    />
  </app-filter-chip>

  <app-filter-chip
    #dateChip
    [label]="dateRangeLabel()"
    [active]="dateRangeActive()"
    (opened)="resetDateDraft()"
  >
    <label class="popover-label" for="from">From</label>
    <input
      id="from"
      class="chip-input"
      type="datetime-local"
      [value]="draftFrom()"
      (input)="onDraftFromInput($event)"
    />

    <label class="popover-label" for="to">To</label>
    <input id="to" class="chip-input" type="datetime-local" [value]="draftTo()" (input)="onDraftToInput($event)" />

    <div class="popover-actions">
      <button type="button" class="apply" (click)="applyDateRange(dateChip)">Apply</button>
      <button type="button" class="clear" (click)="clearDateRange(dateChip)">Clear</button>
    </div>
  </app-filter-chip>

  <button type="button" class="reset-all" (click)="onReset()">Reset</button>
</div>
